<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="40%" fy="40%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#FDFCF8" />
    </radialGradient>
    
    <!-- Retro Core Gradient -->
    <linearGradient id="retroOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A45" />
      <stop offset="100%" stop-color="#E85C28" />
    </linearGradient>

    <!-- Shadow filter for modern depth -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1A1A1A" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Base Circle Container -->
  <rect width="512" height="512" rx="140" fill="url(#bgGrad)" stroke="#EAD9C9" stroke-width="6" />

  <!-- Main Styled Artwork Group -->
  <g filter="url(#softShadow)" transform="translate(0, -10)">
    <!-- Film Reel Backplate Shadow / Reel Circle Outer -->
    <circle cx="256" cy="266" r="145" fill="#1A1A1A" opacity="0.04" />
    
    <!-- Outer Camera Lens border -->
    <circle cx="256" cy="256" r="135" fill="none" stroke="#2B2625" stroke-width="12" />

    <!-- Film Strips wrapping around the lens -->
    <!-- Curved film tail -->
    <path d="M 121 256 C 121 181 181 121 256 121 C 290 121 321 133 345 154" fill="none" stroke="url(#retroOrange)" stroke-width="24" stroke-linecap="round" />
    <path d="M 391 256 C 391 331 331 391 256 391 C 222 391 191 379 167 358" fill="none" stroke="#2B2625" stroke-width="24" stroke-linecap="round" />

    <!-- Film sprocket holes on the orange strip -->
    <circle cx="152" cy="180" r="4" fill="#FFFDF9" />
    <circle cx="192" cy="146" r="4" fill="#FFFDF9" />
    <circle cx="240" cy="133" r="4" fill="#FFFDF9" />
    <circle cx="290" cy="138" r="4" fill="#FFFDF9" />
    
    <!-- Film sprocket holes on the dark strip -->
    <circle cx="360" cy="332" r="4" fill="#FFFDF9" opacity="0.6" />
    <circle cx="320" cy="366" r="4" fill="#FFFDF9" opacity="0.6" />
    <circle cx="272" cy="379" r="4" fill="#FFFDF9" opacity="0.6" />
    <circle cx="222" cy="374" r="4" fill="#FFFDF9" opacity="0.6" />

    <!-- Matte Dark Camera Aperture Inner ring -->
    <circle cx="256" cy="256" r="92" fill="#2B2625" />

    <!-- Aperture Blades (Geometric Lines) -->
    <path d="M 210 190 L 270 170" stroke="#423C3B" stroke-width="2" />
    <path d="M 290 190 L 320 240" stroke="#423C3B" stroke-width="2" />
    <path d="M 310 270 L 270 320" stroke="#423C3B" stroke-width="2" />
    <path d="M 240 310 L 180 280" stroke="#423C3B" stroke-width="2" />
    <path d="M 175 240 L 205 180" stroke="#423C3B" stroke-width="2" />

    <!-- Camera Lens Reflection Glow (Cyan / Orange flare) -->
    <path d="M 190 210 A 66 66 0 0 1 300 210" fill="none" stroke="#FFF" stroke-width="6" stroke-linecap="round" opacity="0.15" />
    <path d="M 210 230 A 40 40 0 0 1 270 230" fill="none" stroke="#FFF" stroke-width="3" stroke-linecap="round" opacity="0.2" />

    <!-- Center Warm Core (The Golden Film Eye) -->
    <circle cx="256" cy="256" r="45" fill="url(#retroOrange)" />
    
    <!-- Center reflection dot -->
    <circle cx="242" cy="242" r="8" fill="#FFF" opacity="0.8" />
    <circle cx="232" cy="248" r="3" fill="#FFF" opacity="0.5" />
  </g>

  <!-- Typography: '청춘필름' written minimalistically beneath the graphic inside the container boundaries -->
  <text x="256" y="445" font-family="'Inter', sans-serif" font-weight="900" font-size="28" letter-spacing="10" fill="#2B2625" text-anchor="middle">청춘필름</text>
  <text x="256" y="475" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="12" letter-spacing="4" fill="#E85C28" text-anchor="middle">FILM ARCHIVE</text>
</svg>
